<style>
  :root {
    /* Rich monarch orange shifting to a vibrant gold at the wing tips */
    --bf-wing-left-start: #E64A19 !important; 
    --bf-wing-left-end: #FFB300 !important;   
    --bf-wing-right-start: #E64A19 !important;
    --bf-wing-right-end: #FFB300 !important;  
    --bf-glow: rgba(230, 74, 25, 0.2) !important;
  }

  /* Full screen non-blocking container positioned strictly relative to the viewport */
  #butterfly-follower-container {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    pointer-events: none !important; /* Let clicks pass straight through to Framer buttons */
    z-index: 99999999 !important;    /* Forces it above absolutely all Framer layers */
    overflow: hidden !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* Performance-optimized glitter trail canvas */
  #glitter-canvas {
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    pointer-events: none !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .butterfly {
    position: absolute !important;
    width: 60px !important;
    height: 60px !important;
    left: -30px !important; /* Anchor alignment offset */
    top: -30px !important;
    transform-style: preserve-3d !important;
    will-change: transform !important;
    opacity: 0; /* Hidden initially until mouse moves */
    transition: opacity 0.8s ease;
    filter: drop-shadow(0 0 8px var(--bf-glow)) !important;
    pointer-events: none !important;
  }

  /* 3D Wing flap container */
  .butterfly-body-container {
    position: relative !important;
    width: 100% !important;
    height: 100% !important;
    transform-style: preserve-3d !important;
  }

  .wing {
    position: absolute !important;
    width: 30px !important;
    height: 60px !important;
    top: 0 !important;
    transform-origin: right center !important;
    transform-style: preserve-3d !important;
  }

  .wing-left {
    left: 0 !important;
    transform-origin: right center !important;
    animation: bf-flap-left 0.75s infinite alternate ease-in-out !important;
  }

  .wing-right {
    left: 30px !important;
    transform-origin: left center !important;
    animation: bf-flap-right 0.75s infinite alternate ease-in-out !important;
  }

  /* Body center segment */
  .butterfly-torso {
    position: absolute !important;
    left: 28px !important;
    top: 14px !important;
    width: 4px !important;
    height: 32px !important;
    background: #111111 !important;
    border-radius: 2px !important;
    box-shadow: 0 0 4px rgba(0,0,0,0.6) !important;
  }

  /* Natural 3D Wing flap angles */
  @keyframes bf-flap-left {
    0% { transform: rotateY(-55deg); }
    100% { transform: rotateY(25deg); }
  }

  @keyframes bf-flap-right {
    0% { transform: rotateY(55deg); }
    100% { transform: rotateY(-25deg); }
  }

  /* Safe Guardrail: Hide completely on touch devices (mobiles/tablets) so it never disrupts tapping */
  @media (hover: none) and (pointer: coarse) {
    #butterfly-follower-container {
      display: none !important;
    }
  }
</style>

<!-- Main Butterfly Elements -->
<div id="butterfly-follower-container">
  <canvas id="glitter-canvas"></canvas>
  <div class="butterfly" id="butterfly">
    <div class="butterfly-body-container">

        <path d="M0 30 Q14 22 24 22" stroke="#111111" stroke-width="1.5" fill="none" opacity="0.95"/>
        <path d="M0 30 Q12 28 20 31" stroke="#111111" stroke-width="1.2" fill="none" opacity="0.95"/>
        <path d="M0 32 Q15 38 18 48" stroke="#111111" stroke-width="1.5" fill="none" opacity="0.95"/>
        <path d="M0 32 Q8 44 10 52" stroke="#111111" stroke-width="1.2" fill="none" opacity="0.95"/>

        <!-- Thick Black Borders -->
        <path d="M0 30 C0 10, 26 2, 28 15 C31 28, 18 32, 0 35 Z" stroke="#111" stroke-width="3" fill="none"/>
        <path d="M0 32 C12 35, 24 42, 20 52 C17 60, 5 55, 0 35 Z" stroke="#111" stroke-width="3" fill="none"/>

        <!-- Little White Margin Spots -->
        <circle cx="26" cy="11" r="1.2" fill="#FFFFFF"/>
        <circle cx="27" cy="17" r="1.2" fill="#FFFFFF"/>
        <circle cx="26" cy="23" r="1.0" fill="#FFFFFF"/>
        <circle cx="22" cy="46" r="1.0" fill="#FFFFFF"/>
        <circle cx="18" cy="51" r="1.2" fill="#FFFFFF"/>
        <circle cx="11" cy="54" r="1.0" fill="#FFFFFF"/>
        
        <defs>
          <linearGradient id="bfWingGradRight1" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="var(--bf-wing-right-end)" />
            <stop offset="70%" stop-color="var(--bf-wing-right-start)" />
            <stop offset="100%" stop-color="#111111" />
          </linearGradient>
          <linearGradient id="bfWingGradRight2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#111111" />
            <stop offset="30%" stop-color="var(--bf-wing-right-start)" />
            <stop offset="100%" stop-color="var(--bf-wing-right-end)" />
          </linearGradient>

      </svg>

      <!-- Torso -->
      <div class="butterfly-torso"></div>

    </div>
  </div>
</div>

<script>
  (function() {
    // Select our freshly rendered container element
    const container = document.getElementById('butterfly-follower-container');
    if (!container) return; // Robust DOM safety guard

    // Avoid double instantiation glitches inside Framer by removing other instances, 
    // keeping ONLY this newly instantiated one.
    const allContainers = document.querySelectorAll('#butterfly-follower-container');
    allContainers.forEach(c => {
      if (c !== container) {
        c.remove();
      }
    });

    // ESCAPE HATCH: Append the container directly to document.body.
    // This moves it out of Framer's nested React coordinate structures safely.
    if (document.body && container.parentElement && container.parentElement !== document.body) {
      document.body.appendChild(container);
    }

    const butterfly = container.querySelector('#butterfly');
    if (!butterfly) return;

    const leftWing = butterfly.querySelector('.wing-left');
    const rightWing = butterfly.querySelector('.wing-right');
    const canvas = container.querySelector('#glitter-canvas');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');
    
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentX = window.innerWidth / 2;
    let currentY = window.innerHeight / 2;
    let velX = 0;
    let velY = 0;
    let currentAngle = 0;
    let hasMoved = false;

    let particles = [];
    const MAX_PARTICLES = 130;

    // Direct tracking relative to viewport coordinates
    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      if (!hasMoved) {
        butterfly.style.opacity = '1';
        hasMoved = true;
      }
    }, { passive: true });

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (!hasMoved) {
        mouseX = window.innerWidth / 2;
        mouseY = window.innerHeight / 2;
      }
    }
    window.addEventListener('resize', resizeCanvas, { passive: true });
    resizeCanvas();

    class GlitterParticle {
      constructor(x, y, vx, vy) {
        this.x = x + (Math.random() - 0.5) * 6;
        this.y = y + (Math.random() - 0.5) * 6;
        
        this.vx = (Math.random() - 0.5) * 0.8 - (vx * 0.08);
        this.vy = (Math.random() - 0.5) * 0.8 - (vy * 0.08) + 0.15;
        
        this.size = Math.random() * 2.2 + 0.6;
        this.maxLife = Math.random() * 30 + 20; 
        this.life = this.maxLife;
        
        const palettes = [
          'rgba(255, 179, 0, ',
          'rgba(230, 74, 25, ',
          'rgba(255, 255, 255, '
        ];
        this.colorBase = palettes[Math.floor(Math.random() * palettes.length)];
        
        this.isStar = Math.random() < 0.25;
        this.rotation = Math.random() * Math.PI;
        this.rotSpeed = (Math.random() - 0.5) * 0.05;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
        this.rotation += this.rotSpeed;
        this.size *= 0.96; 
      }

      draw() {
        const opacity = this.life / this.maxLife;
        ctx.fillStyle = this.colorBase + opacity + ')';
        ctx.shadowColor = this.colorBase + '0.6)';
        ctx.shadowBlur = 3;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        if (this.isStar) {
          ctx.beginPath();
          for (let i = 0; i < 4; i++) {
            ctx.lineTo(0, -this.size * 1.6);
            ctx.rotate(Math.PI / 2);
          }
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function runPhysicsLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.shadowBlur = 0; 

      const time = Date.now() * 0.0008; 
      const driftX = Math.sin(time * 1.2) * 12 + Math.cos(time * 0.4) * 6;
      const driftY = Math.cos(time * 0.9) * 12 + Math.sin(time * 0.3) * 6;

      const actualDx = mouseX - currentX;
      const actualDy = mouseY - currentY;
      const actualDist = Math.sqrt(actualDx * actualDx + actualDy * actualDy);

      const driftScale = Math.min(1.0, actualDist / 120); 
      const finalDriftX = driftX * driftScale;
      const finalDriftY = driftY * driftScale;

      const targetX = mouseX + finalDriftX;
      const targetY = mouseY + finalDriftY;

      const dx = targetX - currentX;
      const dy = targetY - currentY;

      const springTension = 0.015; 
      const friction = 0.84; 

      velX += dx * springTension;
      velY += dy * springTension;

      velX *= friction;
      velY *= friction;

      currentX += velX;
      currentY += velY;

      const speed = Math.sqrt(velX * velX + velY * velY);

      if (hasMoved) {
        let spawnProbability = 0;
        if (speed > 0.6) {
          spawnProbability = Math.min(3, Math.floor(speed * 0.2) + 1);
        } else if (Math.random() < 0.08) {
          spawnProbability = 1;
        }
        
        for (let i = 0; i < spawnProbability; i++) {
          if (particles.length < MAX_PARTICLES) {
            particles.push(new GlitterParticle(currentX, currentY, velX, velY));
          }
        }
      }

      particles.forEach(p => {
        p.update();
        p.draw();
      });
      particles = particles.filter(p => p.life > 0);

      let targetAngle = currentAngle;
      if (speed > 0.18) { 
        targetAngle = Math.atan2(velY, velX) * (180 / Math.PI) + 90;
      }

      let angleDiff = targetAngle - currentAngle;
      angleDiff = ((angleDiff + 180) % 360) - 180;

      const angleEase = speed < 0.5 ? 0.03 : 0.12; 
      currentAngle += angleDiff * angleEase;

      let flapDuration = 0.75; 
      if (speed > 0.4) {
        flapDuration = Math.max(0.42, 0.75 - (speed * 0.016)); 
      }
      
      leftWing.style.animationDuration = `${flapDuration}s`;
      rightWing.style.animationDuration = `${flapDuration}s`;

      let tilt = Math.min(22, Math.max(-22, velX * 0.45));

      butterfly.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) rotate(${currentAngle}deg) rotateY(${tilt}deg)`;

      requestAnimationFrame(runPhysicsLoop);
    }

    requestAnimationFrame(runPhysicsLoop);
  })();
</script>
